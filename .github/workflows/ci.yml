name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  hil-fault:
    name: HIL-FAULT tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/hil-fault
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  quant-shield:
    name: QUANT-SHIELD tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/quant-shield
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
        env:
          PYTHONPATH: src
